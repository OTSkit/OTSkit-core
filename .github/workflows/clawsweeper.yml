name: Notify ClawSweeper

on:
  issues:
    types: [opened, reopened, edited]
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, edited]

permissions:
  contents: read

jobs:
  notify:
    name: Dispatch to ClawSweeper
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Create dispatch token
        id: token
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: "Iv23liyiXRX8T7AX312w"
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: OTSkit
          repositories: clawsweeper
          permission-contents: write

      - name: Dispatch clawsweeper_item event
        if: steps.token.outputs.token != ''
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          ITEM_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          ITEM_KIND: ${{ github.event_name == 'issues' && 'issue' || 'pull_request' }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/OTSkit/clawsweeper/dispatches \
            -f event_type="clawsweeper_item" \
            -F client_payload[target_repo]="OTSkit/otskit-core" \
            -F client_payload[target_branch]="main" \
            -F client_payload[item_number]="$ITEM_NUMBER" \
            -F client_payload[item_kind]="$ITEM_KIND" \
            -F client_payload[hot_intake]="true"
